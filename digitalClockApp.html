<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>

    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgb(115, 101, 101);
        }

        .container{
            background-color: white;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
        }

        h1{
            color: black;
        }

        h2{
            font-size: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Digital Clock</h1>

        <h2></h2>
    </div>

    <script>
        let text = document.querySelector("h2")

        setInterval(()=>{

            let time = new Date()

            let hours = time.getHours()
            let minutes = time.getMinutes()
            let seconds = time.getSeconds()

            text.textContent = hours + ":" + minutes + ":" + seconds

        } , 1000)
    </script>

</body>
</html>
