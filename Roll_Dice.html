<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            background-color:rgb(93, 238, 240);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .head {
            margin-top: 40px;
        }

        .main_container {
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            margin-top: 40px;
            padding: 30px 50px;
            border-radius: 8px;
        }

        img {
            width: 80px;
            height: 80px;

            margin-top: 20px;
        }

        button {
            margin-top: 40px;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    
</body>
<script>
    let headOne = document.createElement("h1")
    headOne.textContent = "Roll The Dice🎲"
    document.body.appendChild(headOne)
    headOne.classList.add("head")
    console.log(headOne);

    let container = document.createElement("div")
    document.body.appendChild(container)
    container.classList.add("main_container")
    console.log(container);

    let headTwo = document.createElement("h2")
    headTwo.textContent = "You Got: - 🎯"
    
    let myImg = document.createElement("img")
    myImg.src = "Images/images (2).jfif"

    let btn = document.createElement("button")
    btn.textContent = "Roll Dice"


    container.appendChild(headTwo)
    container.appendChild(myImg)
    container.appendChild(btn)
    
    
    let images = [
        "Images/dice1.png",
        "Images/dice2.png",
        "Images/dice3.png",
        "Images/dice4.png",
        "Images/dice5.png",
        "Images/dice6.png"
    ]

    btn.addEventListener("click", ()=> {

        let randomIndex = Math.floor(Math.random() * images.length)
        myImg.src = images[randomIndex]
        headTwo.textContent = "You Got: " + (randomIndex + 1) + "🎯"
    })


    
</script>
</html>
