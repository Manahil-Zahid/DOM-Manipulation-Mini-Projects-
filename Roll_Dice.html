<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffb6b9, #fae3d9);
      font-family: Arial, sans-serif;
    }

    .card {
      background: #fff8e7;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 250px;
    }

    h2 {
      color: #c94f7c;
      margin-bottom: 20px;
    }

    #dice {
      font-size: 70px;
      margin: 15px 0;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #c94f7c;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #a83d63;
    }

    .result {
      font-size: 18px;
      margin-bottom: 10px;
      color: #444;
    }
  </style>

</head>
<body>
    <div class="card">
    <div class="result">You got: <span id="number">-</span> 🎯</div>

    <div id="dice">🎲</div>

    <button onclick="rollDice()">ROLL DICE</button>
  </div>
</body>
<script>
    let diceFaces = ["⚀","⚁","⚂","⚃","⚄","⚅"];

    function rollDice() {
      let randomNumber = Math.floor(Math.random() * 6);

      document.getElementById("dice").innerText = diceFaces[randomNumber];
      document.getElementById("number").innerText = randomNumber + 1;
    }
  </script>

</html>
