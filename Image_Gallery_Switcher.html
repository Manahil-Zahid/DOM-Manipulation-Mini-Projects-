<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            background-color: rgb(184, 242, 223);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 300px;
            height: 400px;
            border-radius: 6px;
        }

        .btn_container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            margin-top: 40px;
        }

        button {
            padding: 10px 20px;
            border-radius: 4px;
            border-color: azure;
            cursor: pointer;
        }
    </style>
</head>
<body>
    
</body>
<script>
    let headOne = document.createElement("h1")
    headOne.textContent = "Image Gallery"
    document.body.appendChild(headOne)
    console.log(headOne);


    let images = [
        "Images/Cafea boabe.jfif",
        "Images/download (13).jfif",
        "Images/download (14).jfif"
    ]

    let index = 0


    let myImg = document.createElement("img")
    myImg.src = "Images/images (1).png"
    document.body.appendChild(myImg)
    console.log(myImg);


    let btnContainer = document.createElement("div")
    btnContainer.classList.add("btn_container")
    document.body.appendChild(btnContainer)
    console.log(btnContainer);
    
    let btnOne = document.createElement("button")
    btnOne.textContent = "Previous"

    let btnTwo = document.createElement("button")
    btnTwo.textContent = "Next"
   
    btnContainer.appendChild(btnOne)
    btnContainer.appendChild(btnTwo)

    btnTwo.addEventListener("click", ()=> {
        index++

        if (index >= images.length) {
            index = 0
        }

        myImg.src = images[index]
    })
    
    btnOne.addEventListener("click", ()=> {
        index--

        if (index < 0) {
            index = images.length-1
        }

        myImg.src = images[index]
    })
    
    
</script>
</html>
